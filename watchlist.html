<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist — FIFA World Cup 2026</title>
    <meta name="description" content="Your personal World Cup 2026 match watchlist.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="watchlist.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav id="main-nav">
        <a href="home.html" class="nav-brand" id="tab-wcs">WCS</a>
        <span class="fav-display" id="fav-display"></span>
        <ul class="nav-links">
            <li><a href="team.html" id="tab-teams">Teams</a></li>
            <li><a href="#stadium" id="tab-stadium">Stadium</a></li>
            <li><a href="#matches" id="tab-matches">Matches</a></li>
            <li><a href="scheduler.html" id="tab-scheduler">Scheduler</a></li>
            <li><a href="watchlist.html" id="tab-watchlist" class="active">Watchlist</a></li>
        </ul>
    </nav>

    <!-- Page Content -->
    <main class="page-content">
        <h1 class="page-title">My Watchlist</h1>

        <!-- Loading State -->
        <div id="loading" class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading watchlist...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="error-msg" style="display:none;">
            <p>⚠ Failed to load watchlist. Please try again.</p>
        </div>

        <!-- Empty State -->
        <div id="empty" class="empty-state" style="display:none;">
            <p>Your watchlist is empty.</p>
            <a href="scheduler.html" class="btn-browse">Browse Matches</a>
        </div>

        <!-- Watchlist Items -->
        <div id="watchlist-items" class="match-list" style="display:none;">
            <!-- Cards inserted by JS -->
        </div>
    </main>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="nav.js"></script>
    <script>
        function sbHeaders(contentType) {
            const h = {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            };
            if (contentType) {
                h['Content-Type'] = 'application/json';
                h['Prefer'] = 'return=minimal';
            }
            return h;
        }

        function fmtDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Remove match from Watchlist by its Match
        async function removeFromWatchlist(matchLabel, cardEl) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/Watchlist?Match=eq.${encodeURIComponent(matchLabel)}`, {
                    method: 'DELETE',
                    headers: sbHeaders(true)
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                // Animate removal
                cardEl.style.opacity = '0';
                cardEl.style.transform = 'translateX(40px)';
                setTimeout(() => {
                    cardEl.remove();
                    const remaining = document.querySelectorAll('.match-card');
                    if (remaining.length === 0) {
                        document.getElementById('watchlist-items').style.display = 'none';
                        document.getElementById('empty').style.display = 'block';
                    }
                }, 300);

            } catch (err) {
                console.error('Error removing from watchlist:', err);
            }
        }

        // Main loader
        async function loadWatchlist() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const empty = document.getElementById('empty');
            const watchlistItems = document.getElementById('watchlist-items');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/Watchlist?select=*&order=Date.asc`, {
                    headers: sbHeaders()
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const items = await res.json();

                loading.style.display = 'none';

                if (items.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.classList.add('match-card');

                    // Match column stores "Team1 vs Team2"
                    const teams = item.Match.split(' vs ');
                    const team1 = teams[0] || item.Match;
                    const team2 = teams[1] || '';

                    card.innerHTML = `
                        <div class="match-teams">
                            <span class="team-name">${team1}</span>
                            ${team2 ? '<span class="vs">vs</span>' : ''}
                            ${team2 ? `<span class="team-name">${team2}</span>` : ''}
                        </div>
                        <div class="match-details">
                            <span class="match-date">${fmtDate(item.Date)}</span>
                            ${item.City ? `<span class="match-city">${item.City}</span>` : ''}
                        </div>
                    `;

                    const btn = document.createElement('button');
                    btn.classList.add('btn-remove');
                    btn.textContent = '✕ Remove';
                    btn.addEventListener('click', () => removeFromWatchlist(item.Match, card));

                    card.appendChild(btn);
                    watchlistItems.appendChild(card);
                });

                watchlistItems.style.display = 'flex';

            } catch (err) {
                console.error('Error loading watchlist:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }

        loadWatchlist();
    </script>
</body>

</html>
