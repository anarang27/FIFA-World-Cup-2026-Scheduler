<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduler — FIFA World Cup 2026</title>
    <meta name="description" content="Browse and add World Cup 2026 matches to your personal watchlist.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="scheduler.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav id="main-nav">
        <a href="home.html" class="nav-brand" id="tab-wcs">WCS</a>
        <span class="fav-display" id="fav-display"></span>
        <ul class="nav-links">
            <li><a href="team.html" id="tab-teams">Teams</a></li>
            <li><a href="#stadium" id="tab-stadium">Stadium</a></li>
            <li><a href="#matches" id="tab-matches">Matches</a></li>
            <li><a href="scheduler.html" id="tab-scheduler" class="active">Scheduler</a></li>
            <li><a href="watchlist.html" id="tab-watchlist">Watchlist</a></li>
        </ul>
    </nav>

    <!-- Page Content -->
    <main class="page-content">
        <h1 class="page-title">Match Scheduler</h1>

        <!-- Loading State -->
        <div id="loading" class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading matches...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="error-msg" style="display:none;">
            <p>⚠ Failed to load matches. Please try again.</p>
        </div>

        <!-- Match List -->
        <div id="match-list" class="match-list" style="display:none;">
            <!-- Cards inserted by JS -->
        </div>
    </main>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="nav.js"></script>
    <script>
        function sbHeaders(contentType) {
            const h = {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            };
            if (contentType) {
                h['Content-Type'] = 'application/json';
                h['Prefer'] = 'return=minimal';
            }
            return h;
        }

        // Build a team lookup map: teamid -> teamname
        async function loadTeamMap() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/team?select=teamid,teamname`, {
                headers: sbHeaders()
            });
            const teams = await res.json();
            const map = {};
            teams.forEach(t => map[t.teamid] = t.teamname);
            return map;
        }

        // Format date
        function fmtDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Format time
        function fmtTime(timeStr) {
            const [h, m] = timeStr.split(':');
            const hour = parseInt(h);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const h12 = hour % 12 || 12;
            return `${h12}:${m} ${ampm}`;
        }

        // Add match to Watchlist
        async function addToWatchlist(matchLabel, matchDate, btn) {
            btn.disabled = true;
            btn.textContent = 'Adding...';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/Watchlist`, {
                    method: 'POST',
                    headers: {
                        ...sbHeaders(true),
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        Match: matchLabel,
                        Date: matchDate,
                        City: null
                    })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                btn.textContent = '✓ Added';
                btn.classList.add('added');
            } catch (err) {
                console.error('Error adding to watchlist:', err);
                btn.textContent = 'Error';
                setTimeout(() => {
                    btn.textContent = '+ Add to Watchlist';
                    btn.disabled = false;
                }, 2000);
            }
        }

        // Check which matches are already on the watchlist
        async function loadWatchlistMatches() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/Watchlist?select=Match`, {
                    headers: sbHeaders()
                });
                if (!res.ok) return new Set();
                const data = await res.json();
                return new Set(data.map(r => r.Match));
            } catch {
                return new Set();
            }
        }

        // Main loader
        async function loadScheduler() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const matchList = document.getElementById('match-list');

            try {
                const [teamMap, watchlistMatches] = await Promise.all([
                    loadTeamMap(),
                    loadWatchlistMatches()
                ]);

                const res = await fetch(`${SUPABASE_URL}/rest/v1/match?select=*&order=matchdate.asc,matchtime.asc`, {
                    headers: sbHeaders()
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const matches = await res.json();

                matches.forEach(match => {
                    const card = document.createElement('div');
                    card.classList.add('match-card');

                    const team1 = teamMap[match.team1id] || `Team ${match.team1id}`;
                    const team2 = teamMap[match.team2id] || `Team ${match.team2id}`;
                    const matchLabel = `${team1} vs ${team2}`;

                    const alreadyAdded = watchlistMatches.has(matchLabel);

                    card.innerHTML = `
                        <div class="match-teams">
                            <span class="team-name">${team1}</span>
                            <span class="vs">vs</span>
                            <span class="team-name">${team2}</span>
                        </div>
                        <div class="match-details">
                            <span class="match-group">Group ${match.groupid}</span>
                            <span class="match-date">${fmtDate(match.matchdate)}</span>
                            <span class="match-time">${fmtTime(match.matchtime)}</span>
                        </div>
                    `;

                    const btn = document.createElement('button');
                    btn.classList.add('btn-add');
                    if (alreadyAdded) {
                        btn.textContent = '✓ Added';
                        btn.classList.add('added');
                        btn.disabled = true;
                    } else {
                        btn.textContent = '+ Add to Watchlist';
                        btn.addEventListener('click', () => addToWatchlist(matchLabel, match.matchdate, btn));
                    }

                    card.appendChild(btn);
                    matchList.appendChild(card);
                });

                loading.style.display = 'none';
                matchList.style.display = 'flex';

            } catch (err) {
                console.error('Error loading scheduler:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }

        loadScheduler();
    </script>
</body>

</html>
