<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams — FIFA World Cup 2026 Scheduler</title>
    <meta name="description" content="Browse all 48 qualified teams for the FIFA World Cup 2026.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/team.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav id="main-nav">
        <a href="home.html" class="nav-brand" id="tab-wcs">WCS</a>
        <span class="fav-display" id="fav-display"></span>
        <ul class="nav-links">
            <li><a href="team.html" id="tab-teams">Teams</a></li>
            <li><a href="stadium.html" id="tab-stadium">Stadium</a></li>
            <li><a href="matches.html" id="tab-matches">Matches</a></li>
            <li><a href="scheduler.html" id="tab-scheduler">Scheduler</a></li>
            <li><a href="watchlist.html" id="tab-watchlist">Watchlist</a></li>
            <li><a href="reports.html" id="tab-reports">Reports</a></li>
        </ul>
        <div class="auth-area" id="auth-area"></div>
    </nav>

    <!-- Page Content -->
    <main class="page-content">
        <h1 class="page-title">World Cup 2026 Teams</h1>

        <div id="loading" class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading teams...</p>
        </div>

        <div id="error" class="error-msg" style="display:none;">
            <p>⚠ Failed to load teams. Please try again.</p>
        </div>

        <div id="table-wrapper" class="table-wrapper" style="display:none;">
            <table id="teams-table">
                <thead>
                    <tr>
                        <th id="col-ranking">Ranking</th>
                        <th id="col-flag"></th>
                        <th id="col-country">Country</th>
                        <th id="col-teamname">Team Name</th>
                        <th id="col-coach">Coach</th>
                        <th id="col-favorite">Favorite</th>
                    </tr>
                </thead>
                <tbody id="teams-body">
                    <!-- Rows inserted by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script>
        if (!API.isLoggedIn()) window.location.href = 'index.html';

        let currentFavoriteTeamId = null;

        async function toggleFavorite(teamid, teamname, starEl) {
            const isCurrentlyFav = starEl.classList.contains('filled');
            try {
                // If it's already the fav, remove it; otherwise set it
                await API.post('/api/teams/favorite', {
                    teamid: isCurrentlyFav ? null : teamid
                });

                // Update UI: reset all stars
                document.querySelectorAll('.star').forEach(s => {
                    s.classList.remove('filled');
                    s.textContent = '☆';
                });

                if (!isCurrentlyFav) {
                    starEl.classList.add('filled');
                    starEl.textContent = '★';
                    currentFavoriteTeamId = teamid;
                    updateFavoriteDisplay(teamname);
                } else {
                    currentFavoriteTeamId = null;
                    updateFavoriteDisplay(null);
                }
            } catch (err) {
                console.error('Error toggling favorite:', err);
            }
        }

        async function fetchTeams() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const tableWrapper = document.getElementById('table-wrapper');
            const tbody = document.getElementById('teams-body');

            try {
                const [teams, fav] = await Promise.all([
                    API.get('/api/teams'),
                    API.get('/api/teams/favorite')
                ]);

                currentFavoriteTeamId = fav ? fav.teamid : null;

                teams.forEach(team => {
                    const tr = document.createElement('tr');

                    const rankTd = document.createElement('td');
                    rankTd.textContent = team.ranking ?? '—';
                    rankTd.classList.add('cell-rank');

                    const flagTd = document.createElement('td');
                    flagTd.classList.add('cell-flag');
                    if (team.alpha_iso_2_code) {
                        const code = team.alpha_iso_2_code.toLowerCase();
                        flagTd.innerHTML = `<img src="https://flagcdn.com/w40/${code}.png" alt="${team.country}" class="flag-img">`;
                    }

                    const countryTd = document.createElement('td');
                    countryTd.textContent = team.country ?? '—';

                    const nameTd = document.createElement('td');
                    nameTd.textContent = team.team_name ?? '—';

                    const coachTd = document.createElement('td');
                    coachTd.textContent = team.coach ?? '—';
                    coachTd.classList.add('cell-coach');

                    const favTd = document.createElement('td');
                    favTd.classList.add('cell-fav');

                    const starSpan = document.createElement('span');
                    starSpan.classList.add('star');
                    if (currentFavoriteTeamId === team.team_id) {
                        starSpan.classList.add('filled');
                        starSpan.textContent = '★';
                    } else {
                        starSpan.textContent = '☆';
                    }

                    starSpan.addEventListener('click', () => {
                        toggleFavorite(team.team_id, team.team_name, starSpan);
                    });

                    favTd.appendChild(starSpan);
                    tr.appendChild(rankTd);
                    tr.appendChild(flagTd);
                    tr.appendChild(countryTd);
                    tr.appendChild(nameTd);
                    tr.appendChild(coachTd);
                    tr.appendChild(favTd);
                    tbody.appendChild(tr);
                });

                loading.style.display = 'none';
                tableWrapper.style.display = 'block';

            } catch (err) {
                console.error('Error fetching teams:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }

        fetchTeams();
    </script>
</body>

</html>
